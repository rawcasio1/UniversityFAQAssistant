<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>University FAQ Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-container">
        <header class="chat-header">
            <h2>🎓 University FAQ Assistant</h2>
            <p>NLP Text Preprocessing Demo</p>
        </header>
        
        <div class="chat-box" id="chat-box">
            <div class="message bot-message">
                <strong>Bot:</strong> Hello! Ask me a university-related question.
            </div>
        </div>
        
        <div class="chat-input-area">
            <input type="text" id="user-input" placeholder="e.g., How do I apply for LOA??" onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
        
        <div class="footer-links">
            <a href="/admin">Admin Panel</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
